name: PR Gate

on:
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx @biomejs/biome check src/

  typecheck:
    name: Type Check
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:coverage
        env:
          VITEST_PBT_NUM_RUNS: 100
      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Verify dist output
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/cli.js
          test -f dist/cli.d.ts

  smoke:
    name: CLI Smoke Test
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Smoke test --help
        run: |
          help_output=$(node dist/cli.js --help)
          echo "$help_output" | grep -q "Usage:" || { echo "FAIL: --help missing 'Usage:'"; exit 1; }
          echo "$help_output" | grep -q "generate" || { echo "FAIL: --help missing 'generate' subcommand"; exit 1; }
          echo "$help_output" | grep -q "watch" || { echo "FAIL: --help missing 'watch' subcommand"; exit 1; }
      - name: Smoke test --version
        run: |
          version_output=$(node dist/cli.js --version)
          [ "$version_output" = "0.1.0" ] || { echo "FAIL: --version expected 0.1.0, got $version_output"; exit 1; }

  mutation:
    name: Mutation Test (Incremental)
    runs-on: ["self-hosted", "node", "macos"]
    needs: [test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore stryker incremental cache
        id: cache-stryker
        uses: actions/cache@v4
        with:
          path: .stryker-incremental.json
          key: stryker-incremental-${{ github.base_ref }}-${{ github.sha }}
          restore-keys: |
            stryker-incremental-${{ github.base_ref }}-
            stryker-incremental-main-
      - name: Mutation test (incremental, changed files only)
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'src/' | tr '\n' ',' | sed 's/,$//')
          if [ -n "$CHANGED" ]; then
            pnpm exec stryker run --incremental --force --mutate "$CHANGED"
          else
            echo "No src/ files changed, skipping mutation"
          fi
      - name: Upload stryker incremental state
        uses: actions/upload-artifact@v4
        with:
          name: stryker-incremental
          path: .stryker-incremental.json
          if-no-files-found: ignore

  integration:
    name: Integration Tests
    runs-on: ["self-hosted", "node", "macos"]
    needs: [build]
    if: github.ref == 'refs/heads/main'

  gitleaks:
    name: Secrets Scan (Gitleaks)
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: brew install gitleaks
      - name: Run gitleaks detect
        run: gitleaks detect --source . --no-git -v

  trivy:
    name: Vulnerability Scan (Trivy)
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  structure:
    name: Repository Structure
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build structurelint
        run: |
          rm -rf /tmp/structurelint
          git clone --depth 1 https://github.com/Jonathangadeaharder/structurelint.git /tmp/structurelint
          cd /tmp/structurelint && go build -o /usr/local/bin/structurelint ./cmd/structurelint
      - name: Run structurelint
        run: structurelint .
      - name: Cleanup structurelint build
        if: always()
        run: rm -rf /tmp/structurelint

  vitest-lint:
    name: Test Quality (Vitest)
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install and run vitest-linter
        run: |
          npm install -g vitest-linter 2>/dev/null || true
          vitest-linter . --format terminal

  required-checks:
    name: Required Checks (PR Gate)
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: always() && (github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository)
    needs: [lint, typecheck, test, build, gitleaks, structure, vitest-lint]
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] && [ "${{ needs.lint.result }}" != "skipped" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] && [ "${{ needs.typecheck.result }}" != "skipped" ] || \
             [ "${{ needs.test.result }}" != "success" ] && [ "${{ needs.test.result }}" != "skipped" ] || \
             [ "${{ needs.build.result }}" != "success" ] && [ "${{ needs.build.result }}" != "skipped" ] || \
             [ "${{ needs.gitleaks.result }}" != "success" ] && [ "${{ needs.gitleaks.result }}" != "skipped" ] || \
             [ "${{ needs.structure.result }}" != "success" ] && [ "${{ needs.structure.result }}" != "skipped" ] || \
             [ "${{ needs.vitest-lint.result }}" != "success" ] && [ "${{ needs.vitest-lint.result }}" != "skipped" ]; then
            echo "::error::One or more PR Gate jobs failed."
            exit 1
          fi
          echo "All PR Gate jobs passed."

