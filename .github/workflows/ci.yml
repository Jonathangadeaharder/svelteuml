name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx @biomejs/biome check src/

  typecheck:
    name: Type Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: self-hosted
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:coverage
        env:
          VITEST_PBT_NUM_RUNS: 1000
      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build
    runs-on: self-hosted
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Verify dist output
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/cli.js
          test -f dist/cli.d.ts

  smoke:
    name: CLI Smoke Test
    runs-on: self-hosted
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Smoke test --help
        run: |
          help_output=$(node dist/cli.js --help)
          echo "$help_output" | grep -q "Usage:" || { echo "FAIL: --help missing 'Usage:'"; exit 1; }
          echo "$help_output" | grep -q "generate" || { echo "FAIL: --help missing 'generate' subcommand"; exit 1; }
          echo "$help_output" | grep -q "watch" || { echo "FAIL: --help missing 'watch' subcommand"; exit 1; }
      - name: Smoke test --version
        run: |
          version_output=$(node dist/cli.js --version)
          [ "$version_output" = "0.1.0" ] || { echo "FAIL: --version expected 0.1.0, got $version_output"; exit 1; }

  integration:
    name: Integration Tests
    runs-on: self-hosted
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:integration

  publish:
    name: Publish to npm
    runs-on: self-hosted
    needs: [lint, typecheck, test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
