name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ["self-hosted", "node", "macos"]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome check src/

  typecheck:
    name: Type Check
    runs-on: ["self-hosted", "node", "macos"]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ["self-hosted", "node", "macos"]
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:coverage
        env:
          VITEST_PBT_NUM_RUNS: 100
      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build
    runs-on: ["self-hosted", "node", "macos"]
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Verify dist output
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/cli.js
          test -f dist/cli.d.ts

  smoke:
    name: CLI Smoke Test
    runs-on: ["self-hosted", "node", "macos"]
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Smoke test --help
        run: |
          help_output=$(node dist/cli.js --help)
          echo "$help_output" | grep -q "Usage:" || { echo "FAIL: --help missing 'Usage:'"; exit 1; }
          echo "$help_output" | grep -q "generate" || { echo "FAIL: --help missing 'generate' subcommand"; exit 1; }
          echo "$help_output" | grep -q "watch" || { echo "FAIL: --help missing 'watch' subcommand"; exit 1; }
      - name: Smoke test --version
        run: |
          version_output=$(node dist/cli.js --version)
          [ "$version_output" = "0.1.0" ] || { echo "FAIL: --version expected 0.1.0, got $version_output"; exit 1; }

  mutation:
    name: Mutation Test (Incremental)
    runs-on: ["self-hosted", "node", "macos"]
    needs: [test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore stryker incremental cache
        id: cache-stryker
        uses: actions/cache@v4
        with:
          path: .stryker-incremental.json
          key: stryker-incremental-${{ github.base_ref }}-${{ github.sha }}
          restore-keys: |
            stryker-incremental-${{ github.base_ref }}-
            stryker-incremental-main-
      - name: Mutation test (incremental, changed files only)
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'src/' | tr '\n' ',' | sed 's/,$//')
          if [ -n "$CHANGED" ]; then
            pnpm exec stryker run --incremental --force --mutate "$CHANGED"
          else
            echo "No src/ files changed, skipping mutation"
          fi
      - name: Upload stryker incremental state
        uses: actions/upload-artifact@v4
        with:
          name: stryker-incremental
          path: .stryker-incremental.json
          if-no-files-found: ignore

  integration:
    name: Integration Tests
    runs-on: ["self-hosted", "node", "macos"]
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:integration

  snapshot-diff:
    name: Snapshot Diff
    runs-on: ["self-hosted", "node", "macos"]
    needs: [test]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate & post snapshot diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          diff_body=$(./scripts/snapshot-diff.sh)
          if [ -n "$diff_body" ]; then
            echo "$diff_body" | gh pr comment "${{ github.event.pull_request.number }}" --body-file -
          else
            echo "No snapshot differences."
          fi

  repo-structure:
    name: Repo Structure
    runs-on: ["self-hosted", "go", "macos"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build structurelint
        run: |
          rm -rf /tmp/structurelint
          git clone --branch feat/quality-gates --depth 1 https://github.com/Jonathangadeaharder/structurelint.git /tmp/structurelint
          cd /tmp/structurelint && go build -o /usr/local/bin/structurelint ./cmd/structurelint
      - name: Run structurelint
        run: structurelint .

  publish:
    name: Publish to npm
    runs-on: ["self-hosted", "node", "macos"]
    needs: [lint, typecheck, test, build, repo-structure]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  required-checks:
    name: Required Checks (CI)
    runs-on: ["self-hosted", "node", "macos"]
    needs: [lint, typecheck, test, build, repo-structure]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.repo-structure.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
